name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  # 测试用占位密钥（32字节）
  AES_KEY: "dGVzdGtleXRlc3RrZXl0ZXN0a2V5dGVzdGtleXRlc3Q="
  AGENT_TOKEN: "test-token"
  PRODUCER_API_TOKEN: "test-producer-token"

jobs:

  # ── 代码质量检查 ──────────────────────────────────────────────
  lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff

      - name: Lint check
        run: ruff check .

      - name: Format check
        run: ruff format --check .

  # ── 单元测试 ──────────────────────────────────────────────────
  test:
    name: Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests
        run: |
          PYTHONPATH=. pytest tests/unit/ \
            -v \
            --tb=short \
            --cov=core \
            --cov=infra \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ── 集成测试（仅 main 分支）──────────────────────────────────
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main'

    services:
      rabbitmq:
        image: rabbitmq:3.13-alpine
        ports:
          - 5672:5672
        options: >-
          --health-cmd "rabbitmq-diagnostics ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: shellagent_test
          MYSQL_USER: shellagent
          MYSQL_PASSWORD: shellagent123
        options: >-
          --health-cmd "mysqladmin ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run integration tests
        env:
          MQ_HOST: localhost
          DB_HOST: localhost
          DB_USER: shellagent
          DB_PASSWORD: shellagent123
          DB_NAME: shellagent_test
        run: |
          PYTHONPATH=. pytest tests/integration/ -v --tb=short || true

  # ── Docker 构建验证 ───────────────────────────────────────────
  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Build Agent image
        run: docker build -f deploy/Dockerfile.agent -t shellagent-agent:ci .

      - name: Build Producer image
        run: docker build -f deploy/Dockerfile.producer -t shellagent-producer:ci .

      - name: Build Consumer image
        run: docker build -f deploy/Dockerfile.consumer -t shellagent-consumer:ci .

  # ── 发布（仅 main 分支，打 tag 时触发）───────────────────────
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, docker-build]
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version tag
        id: tag
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build & push Agent
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.agent
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shellagent-agent:${{ steps.tag.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/shellagent-agent:latest

      - name: Build & push Producer
        uses: docker/build-push-action@v5
        with:
          context: .
          file: deploy/Dockerfile.producer
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shellagent-producer:${{ steps.tag.outputs.VERSION }}
            ${{ secrets.DOCKER_USERNAME }}/shellagent-producer:latest

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
