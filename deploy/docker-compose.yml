version: "3.9"

# ══════════════════════════════════════════════════════════════
# Shell Agent — Docker Compose
# 启动：make docker-up
# 停止：make docker-down
# ══════════════════════════════════════════════════════════════

x-common-env: &common-env
  ENV:      ${ENV:-development}
  AES_KEY:  ${AES_KEY}
  MQ_HOST:  rabbitmq
  MQ_PORT:  5672
  MQ_USER:  ${MQ_USER:-guest}
  MQ_PASSWORD: ${MQ_PASSWORD:-guest}
  MQ_VHOST: ${MQ_VHOST:-/}

services:

  # ── 基础设施 ────────────────────────────────────────────────

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: shellagent-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"    # 管理界面
    environment:
      RABBITMQ_DEFAULT_USER: ${MQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${MQ_PASSWORD:-guest}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: shellagent-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE:      ${DB_NAME:-shellagent}
      MYSQL_USER:          ${DB_USER:-shellagent}
      MYSQL_PASSWORD:      ${DB_PASSWORD:-shellagent123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── 应用服务 ────────────────────────────────────────────────

  agent:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.agent
    container_name: shellagent-agent
    ports:
      - "${AGENT_PORT:-8000}:8000"
    environment:
      <<: *common-env
      AGENT_TOKEN:     ${AGENT_TOKEN:-my-secret-token}
      AGENT_HOST:      0.0.0.0
      AGENT_PORT:      8000
      AGENT_LOG_LEVEL: ${AGENT_LOG_LEVEL:-INFO}
    volumes:
      - agent_logs:/app/logs
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  producer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.producer
    container_name: shellagent-producer
    ports:
      - "${PRODUCER_API_PORT:-9000}:9000"
    environment:
      <<: *common-env
      PRODUCER_API_TOKEN:     ${PRODUCER_API_TOKEN:-producer-secret}
      PRODUCER_API_HOST:      0.0.0.0
      PRODUCER_API_PORT:      9000
      PRODUCER_POLL_INTERVAL: ${PRODUCER_POLL_INTERVAL:-300}
      PRODUCER_LOG_LEVEL:     ${PRODUCER_LOG_LEVEL:-INFO}
      DB_HOST:     mysql
      DB_PORT:     3306
      DB_USER:     ${DB_USER:-shellagent}
      DB_PASSWORD: ${DB_PASSWORD:-shellagent123}
      DB_NAME:     ${DB_NAME:-shellagent}
    volumes:
      - producer_logs:/app/logs
    depends_on:
      rabbitmq:
        condition: service_healthy
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  consumer:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.consumer
    container_name: shellagent-consumer
    environment:
      <<: *common-env
      MQ_USER_ID: ${MQ_USER_ID:-user123}
    volumes:
      - consumer_logs:/app/logs
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  rabbitmq_data:
  mysql_data:
  agent_logs:
  producer_logs:
  consumer_logs:
