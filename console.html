<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shell Agent Console v1.2.0</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0d0f14;
    --bg2:       #13161e;
    --bg3:       #1a1e28;
    --border:    #252a38;
    --green:     #00ff88;
    --green-dim: #00ff8833;
    --amber:     #ffb700;
    --red:       #ff4d6d;
    --blue:      #4d9fff;
    --muted:     #4a5068;
    --text:      #c8d0e8;
    --text2:     #7a839e;
    --radius:    8px;
    --mono:      'JetBrains Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--sans); }

  .shell {
    display: grid;
    grid-template-rows: 56px 1fr auto;
    height: 100vh;
    max-width: 960px;
    margin: 0 auto;
    padding: 0 20px;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 15px;
    font-weight: 800;
    letter-spacing: .05em;
    color: var(--green);
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .conn-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .conn-row input {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 5px 10px;
    outline: none;
    width: 200px;
    transition: border-color .2s;
  }
  .conn-row input:focus { border-color: var(--green); }
  .conn-row input::placeholder { color: var(--muted); }

  /* ── Output area ── */
  .output {
    overflow-y: auto;
    padding: 20px 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  /* ── Entry ── */
  .entry { display: flex; flex-direction: column; gap: 6px; }

  .entry-cmd {
    display: flex;
    align-items: baseline;
    gap: 10px;
    font-family: var(--mono);
    font-size: 13px;
  }
  .entry-cmd .prompt-path {
    color: var(--blue);
    flex-shrink: 0;
    font-size: 12px;
    opacity: .85;
  }
  .entry-cmd .prompt-arrow { color: var(--green); flex-shrink: 0; }
  .entry-cmd .cmd-text { color: #e8eaf6; word-break: break-all; }

  .entry-meta {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    padding-left: 22px;
  }
  .entry-meta .rc-ok  { color: var(--green); }
  .entry-meta .rc-err { color: var(--red); }

  .entry-output {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border);
    border-radius: 0 var(--radius) var(--radius) 0;
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 12.5px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    max-height: 400px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
    transition: border-color .2s;
  }
  .entry-output.ok  { border-left-color: var(--green); }
  .entry-output.err { border-left-color: var(--red); }
  .entry-output.streaming { border-left-color: var(--amber); }
  .entry-output .stderr-line { color: var(--red); }

  /* ── 权限错误提示 ── */
  .perm-banner {
    margin-top: 10px;
    background: #ffb70018;
    border: 1px solid var(--amber);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--amber);
    line-height: 1.8;
  }
  .perm-banner .perm-title { font-weight: 600; margin-bottom: 2px; }
  .perm-banner .perm-steps { color: var(--text2); margin: 4px 0 8px; }
  .perm-btn {
    display: inline-block;
    padding: 5px 14px;
    background: #ffb70022;
    border: 1px solid var(--amber);
    border-radius: 6px;
    color: var(--amber);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: background .15s;
  }
  .perm-btn:hover { background: #ffb70044; }

  /* ── 授权确认弹窗 ── */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.55);
    display: flex; align-items: center; justify-content: center;
    z-index: 999;
    animation: fadeIn .15s ease;
  }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px 28px;
    width: 360px;
    box-shadow: 0 8px 32px rgba(0,0,0,.4);
  }
  .modal-icon  { font-size: 28px; margin-bottom: 10px; }
  .modal-title { font-family: var(--sans); font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
  .modal-body  { font-family: var(--mono); font-size: 12px; color: var(--text2); line-height: 1.7; margin-bottom: 20px; }
  .modal-cmd   { color: var(--amber); word-break: break-all; }
  .modal-btns  { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-cancel {
    padding: 7px 18px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text2);
    font-family: var(--sans); font-size: 12px; font-weight: 700;
    cursor: pointer; transition: border-color .15s;
  }
  .modal-cancel:hover { border-color: var(--text2); }
  .modal-confirm {
    padding: 7px 18px;
    background: #ffb70022;
    border: 1px solid var(--amber);
    border-radius: 6px;
    color: var(--amber);
    font-family: var(--sans); font-size: 12px; font-weight: 700;
    cursor: pointer; transition: background .15s;
  }
  .modal-confirm:hover { background: #ffb70044; }

  /* ── Skeleton loader ── */
  .skeleton {
    height: 14px; border-radius: 4px;
    background: linear-gradient(90deg, var(--bg3) 25%, var(--border) 50%, var(--bg3) 75%);
    background-size: 200% 100%;
    animation: shimmer 1.2s infinite;
    margin-bottom: 6px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Welcome ── */
  .welcome {
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.9;
    color: var(--muted);
    padding: 8px 0 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .welcome .hi { color: var(--green); font-size: 14px; font-weight: 600; }

  /* ── Input bar ── */
  .input-bar {
    border-top: 1px solid var(--border);
    padding: 16px 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  /* cwd 显示条 */
  .cwd-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text2);
    padding: 0 2px;
  }
  .cwd-bar .cwd-label { color: var(--muted); }
  .cwd-bar .cwd-path  { color: var(--blue); }
  .cwd-bar .cwd-sep   { color: var(--border); }

  .input-row {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    transition: border-color .2s;
  }
  .input-row:focus-within { border-color: var(--green); }
  .input-row .prompt { font-family: var(--mono); font-size: 14px; color: var(--green); }

  #cmd-input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: #e8eaf6;
    font-family: var(--mono);
    font-size: 13px;
    caret-color: var(--green);
  }
  #cmd-input::placeholder { color: var(--muted); }

  .btn {
    background: var(--green-dim);
    border: 1px solid var(--green);
    border-radius: 6px;
    color: var(--green);
    font-family: var(--sans);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: .06em;
    padding: 6px 14px;
    cursor: pointer;
    transition: background .15s, transform .1s;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .btn:hover { background: #00ff8855; }
  .btn:active { transform: scale(.96); }
  .btn:disabled { opacity: .4; cursor: not-allowed; }
  .btn.danger { background: #ff4d6d1a; border-color: var(--red); color: var(--red); }
  .btn.danger:hover { background: #ff4d6d33; }

  .opts-row {
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 12px;
    color: var(--text2);
    font-family: var(--mono);
  }
  .opts-row label { display: flex; align-items: center; gap: 6px; cursor: pointer; }
  .opts-row input[type=number] {
    width: 52px;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 4px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    padding: 2px 6px;
    outline: none;
  }
  .toggle {
    appearance: none; width: 30px; height: 16px;
    border-radius: 8px; background: var(--border); cursor: pointer;
    position: relative; transition: background .2s;
  }
  .toggle::after {
    content: ''; position: absolute; top: 2px; left: 2px;
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--text2); transition: transform .2s, background .2s;
  }
  .toggle:checked { background: var(--green-dim); }
  .toggle:checked::after { transform: translateX(14px); background: var(--green); }

  .shortcut-hint {
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
    margin-left: auto;
  }
  kbd {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 10px;
  }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-dot"></div>
      SHELL AGENT
      <span style="font-size:10px;font-weight:400;color:var(--muted);letter-spacing:.03em;margin-left:4px">v1.2.0</span>
    </div>
    <div class="conn-row">
      <input id="agent-url"   placeholder="http://192.168.1.100:8000" value="http://localhost:8000">
      <input id="agent-token" placeholder="x-token" value="my-secret-token" type="password" style="width:140px">
    </div>
  </header>

  <!-- Output -->
  <div class="output" id="output">
    <div class="welcome">
      <div class="hi">// Shell Agent Console</div>
      <div>连接到远程 macOS 主机，在下方输入命令后按 Enter 执行。</div>
      <div>支持流式输出（适合 ping / 编译等长命令），使用 zsh 执行。</div>
      <div>支持 <span style="color:var(--green)">cd</span> 跨命令保持目录状态，初始目录为 <span style="color:var(--blue)">~</span>。</div>
      <div style="color:var(--amber)">⚠  请确保 Token 正确，并仅在受信网络中使用。</div>
    </div>
  </div>

  <!-- Input bar -->
  <div class="input-bar">
    <!-- 当前目录展示 -->
    <div class="cwd-bar">
      <span class="cwd-label">cwd</span>
      <span class="cwd-sep">›</span>
      <span class="cwd-path" id="cwd-display">~</span>
    </div>

    <div class="input-row">
      <span class="prompt">❯</span>
      <input id="cmd-input" placeholder="输入 Shell 命令，如 cd /tmp / ls -la / find . -name '*.py'" autocomplete="off" spellcheck="false">
      <button class="btn" id="run-btn" onclick="runCmd()">RUN</button>
      <button class="btn danger" onclick="clearOutput()">CLR</button>
    </div>
    <div class="opts-row">
      <label>
        <input class="toggle" type="checkbox" id="stream-toggle">
        流式输出
      </label>
      <label>
        超时 <input type="number" id="timeout-val" value="30" min="1" max="300"> 秒
      </label>
      <span class="shortcut-hint"><kbd>Enter</kbd> 执行 &nbsp; <kbd>↑↓</kbd> 历史</span>
    </div>
  </div>

</div>

<script>
  const outputEl  = document.getElementById('output');
  const cmdInput  = document.getElementById('cmd-input');
  const runBtn    = document.getElementById('run-btn');
  const cwdDisplay = document.getElementById('cwd-display');

  let history = [];
  let histIdx  = -1;

  // ── 更新 cwd 显示（将 /Users/xxx 缩短为 ~/xxx）──────────────
  function updateCwd(path) {
    if (!path) return;
    // 尝试把 /Users/<name> 或 /home/<name> 替换为 ~
    const shortened = path.replace(/^\/(?:Users|home)\/[^/]+/, '~');
    cwdDisplay.textContent = shortened;
    cwdDisplay.title = path;  // hover 显示完整路径
  }

  // 启动时拉取当前 cwd
  async function fetchInitialCwd() {
    const url   = document.getElementById('agent-url').value.trim().replace(/\/$/, '');
    const token = document.getElementById('agent-token').value.trim();
    try {
      const res = await fetch(`${url}/cwd`, { headers: { 'x-token': token } });
      if (res.ok) {
        const data = await res.json();
        updateCwd(data.cwd);
      }
    } catch (_) {}
  }
  fetchInitialCwd();

  // ── 键盘：Enter 执行，↑↓ 历史 ──────────────────────────────
  cmdInput.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); runCmd(); return; }
    if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (history.length === 0) return;
      histIdx = Math.min(histIdx + 1, history.length - 1);
      cmdInput.value = history[histIdx];
    }
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      histIdx = Math.max(histIdx - 1, -1);
      cmdInput.value = histIdx === -1 ? '' : history[histIdx];
    }
  });

  function clearOutput() { outputEl.innerHTML = ''; }

  function scrollBottom() { outputEl.scrollTop = outputEl.scrollHeight; }

  // ── 创建 Entry DOM ──────────────────────────────────────────
  function createEntry(cmd) {
    const entry = document.createElement('div');
    entry.className = 'entry';

    const cmdRow = document.createElement('div');
    cmdRow.className = 'entry-cmd';

    const pathSpan = document.createElement('span');
    pathSpan.className = 'prompt-path';
    pathSpan.textContent = cwdDisplay.textContent;

    const arrowSpan = document.createElement('span');
    arrowSpan.className = 'prompt-arrow';
    arrowSpan.textContent = ' ❯';

    const cmdText = document.createElement('span');
    cmdText.className = 'cmd-text';
    cmdText.textContent = cmd;

    cmdRow.appendChild(pathSpan);
    cmdRow.appendChild(arrowSpan);
    cmdRow.appendChild(cmdText);

    const meta = document.createElement('div');
    meta.className = 'entry-meta';
    meta.textContent = new Date().toLocaleTimeString();

    const out = document.createElement('div');
    out.className = 'entry-output';

    entry.appendChild(cmdRow);
    entry.appendChild(meta);
    entry.appendChild(out);
    outputEl.appendChild(entry);
    scrollBottom();
    return { entry, meta, out };
  }

  function showSkeleton(el) {
    el.innerHTML = [70, 90, 55].map(w =>
      `<div class="skeleton" style="width:${w}%"></div>`
    ).join('');
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── 主执行函数 ──────────────────────────────────────────────
  async function runCmd() {
    const cmd   = cmdInput.value.trim();
    if (!cmd) return;
    const url   = document.getElementById('agent-url').value.trim().replace(/\/$/, '');
    const token = document.getElementById('agent-token').value.trim();
    const stream  = document.getElementById('stream-toggle').checked;
    const timeout = parseInt(document.getElementById('timeout-val').value) || 30;

    history.unshift(cmd);
    histIdx = -1;
    cmdInput.value = '';
    runBtn.disabled = true;

    const { meta, out } = createEntry(cmd);
    showSkeleton(out);

    try {
      if (stream) {
        await runStream(url, token, cmd, timeout, meta, out);
      } else {
        await runSync(url, token, cmd, timeout, meta, out);
      }
    } catch (e) {
      out.className = 'entry-output err';
      out.textContent = '❌ 连接失败：' + e.message;
      meta.innerHTML = `<span class="rc-err">network error</span>`;
    } finally {
      runBtn.disabled = false;
      cmdInput.focus();
      scrollBottom();
    }
  }

  // ── 同步执行 ────────────────────────────────────────────────
  async function runSync(url, token, cmd, timeout, meta, out) {
    const t0 = Date.now();
    const res = await fetch(`${url}/exec`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-token': token },
      body: JSON.stringify({ command: cmd, timeout }),
    });

    const data = await res.json();
    const elapsed = Date.now() - t0;

    if (!res.ok) {
      out.className = 'entry-output err';
      out.textContent = `HTTP ${res.status}: ${data.detail || JSON.stringify(data)}`;
      meta.innerHTML = `<span class="rc-err">HTTP ${res.status}</span>`;
      return;
    }

    // 更新 cwd 显示
    if (data.cwd) updateCwd(data.cwd);

    const rc  = data.returncode;
    const dur = data.duration_ms ?? elapsed;
    out.className = `entry-output ${rc === 0 ? 'ok' : 'err'}`;

    let html = '';
    if (data.stdout) html += escHtml(data.stdout);
    if (data.stderr)  html += `<span class="stderr-line">${escHtml(data.stderr)}</span>`;
    if (!html)        html = '<span style="color:var(--muted)">(no output)</span>';

    // sudo 成功提示
    if (data.sudo_used) {
      html += `\n<span style="color:var(--amber);font-size:11px">⚡ 已通过授权以管理员权限执行</span>`;
    }
    // 权限错误引导
    if (data.permission_error) {
      html += showPermissionError(url, token, cmd, out, meta);
    }
    out.innerHTML = html;

    meta.innerHTML =
      `rc=<span class="${rc===0?'rc-ok':'rc-err'}">${rc}</span>` +
      ` &nbsp; ${dur}ms &nbsp; ${new Date().toLocaleTimeString()}` +
      (data.cwd ? ` &nbsp; <span style="color:var(--blue)">${escHtml(data.cwd.replace(/^\/(?:Users|home)\/[^/]+/, '~'))}</span>` : '');
  }

  // ── 流式执行（SSE）──────────────────────────────────────────
  async function runStream(url, token, cmd, timeout, meta, out) {
    out.className = 'entry-output streaming';
    out.textContent = '';

    const res = await fetch(`${url}/exec/stream`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'x-token': token },
      body: JSON.stringify({ command: cmd, timeout, stream: true }),
    });

    if (!res.ok) {
      const data = await res.json().catch(() => ({}));
      out.className = 'entry-output err';
      out.textContent = `HTTP ${res.status}: ${data.detail || ''}`;
      meta.innerHTML = `<span class="rc-err">HTTP ${res.status}</span>`;
      return;
    }

    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    let rc  = null;
    meta.textContent = '⏳ streaming...';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();

      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const obj = JSON.parse(line.slice(6));
          if (obj.done) {
            rc = obj.returncode;
            if (obj.cwd) updateCwd(obj.cwd);
            if (obj.sudo_used) {
              out.textContent += '\n⚡ 已通过授权以管理员权限执行';
            }
            if (obj.permission_error) {
              out.insertAdjacentHTML('beforeend', showPermissionError(url, token, cmd, out, meta));
            }
          } else if (obj.line != null) {
            out.textContent += obj.line;
            scrollBottom();
          }
        } catch (_) {}
      }
    }

    out.className = `entry-output ${(rc ?? 0) === 0 ? 'ok' : 'err'}`;
    if (rc !== null) {
      const shortCwd = cwdDisplay.textContent;
      meta.innerHTML =
        `rc=<span class="${rc===0?'rc-ok':'rc-err'}">${rc}</span>` +
        ` &nbsp; stream &nbsp; ${new Date().toLocaleTimeString()}` +
        ` &nbsp; <span style="color:var(--blue)">${escHtml(shortCwd)}</span>`;
    }
  }

  cmdInput.focus();

  // ── 权限错误引导 ────────────────────────────────────────────
  // ── 权限错误：弹窗确认 → sudo 重试 ──────────────────────────
  function showPermissionError(url, token, cmd, out, meta) {
    // 先在输出框下方显示提示横幅
    const banner = `<div class="perm-banner">
      <div class="perm-title">⚠ 权限不足（Operation not permitted）</div>
      <div class="perm-steps">此操作需要管理员权限</div>
      <span class="perm-btn" onclick="confirmSudo('${escHtml(url)}','${escHtml(token)}','${escHtml(cmd)}')">
        🔑 授权并重试
      </span>
      &nbsp;
      <span class="perm-btn" onclick="grantAccess('${escHtml(url)}','${escHtml(token)}')">
        🔓 开启磁盘访问权限
      </span>
    </div>`;
    return banner;
  }

  // 弹出确认 modal，用户点确认后以 sudo 重试
  function confirmSudo(url, token, cmd) {
    // 创建 modal
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal">
        <div class="modal-icon">🔑</div>
        <div class="modal-title">需要管理员权限</div>
        <div class="modal-body">
          以下命令遇到权限限制：<br>
          <span class="modal-cmd">${escHtml(cmd)}</span><br><br>
          点击「授权执行」后，macOS 将弹出系统密码框，
          输入密码后以管理员权限重新执行。
        </div>
        <div class="modal-btns">
          <button class="modal-cancel" onclick="this.closest('.modal-overlay').remove()">取消</button>
          <button class="modal-confirm" onclick="doSudoRetry('${escHtml(url)}','${escHtml(token)}','${escHtml(cmd)}',this)">
            授权执行
          </button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    // 点遮罩关闭
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });
  }

  // 确认后以 sudo_on_permission_error=true 重新发请求
  async function doSudoRetry(url, token, cmd, btn) {
    btn.disabled = true;
    btn.textContent = '执行中...';
    const overlay = btn.closest('.modal-overlay');

    try {
      const res = await fetch(`${url}/exec`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-token': token },
        body: JSON.stringify({ command: cmd, timeout: 60, sudo_on_permission_error: true }),
      });
      overlay.remove();

      const data = await res.json();
      // 找到最后一个 entry 的 out 元素更新结果
      const entries = document.querySelectorAll('.entry');
      const lastOut  = entries[entries.length - 1]?.querySelector('.entry-output');
      const lastMeta = entries[entries.length - 1]?.querySelector('.entry-meta');
      if (!lastOut) return;

      const rc = data.returncode;
      lastOut.className = `entry-output ${rc === 0 ? 'ok' : 'err'}`;
      let html = '';
      if (data.stdout) html += escHtml(data.stdout);
      if (data.stderr)  html += `<span class="stderr-line">${escHtml(data.stderr)}</span>`;
      if (!html)        html = '<span style="color:var(--muted)">(no output)</span>';
      if (data.sudo_used) html += `\n<span style="color:var(--amber);font-size:11px">⚡ 已通过授权以管理员权限执行</span>`;
      if (data.permission_error) html += showPermissionError(url, token, cmd);
      lastOut.innerHTML = html;

      if (lastMeta) {
        lastMeta.innerHTML =
          `rc=<span class="${rc===0?'rc-ok':'rc-err'}">${rc}</span>` +
          ` &nbsp; sudo &nbsp; ${new Date().toLocaleTimeString()}`;
      }
      if (data.cwd) updateCwd(data.cwd);
      scrollBottom();
    } catch (e) {
      overlay.remove();
      alert('请求失败：' + e.message);
    }
  }

  // 打开系统设置完整磁盘访问权限页面
  async function grantAccess(url, token) {
    try {
      await fetch(`${url}/grant-access`, { headers: { 'x-token': token } });
    } catch (_) {
      window.open('x-apple.systempreferences:com.apple.preference.security?Privacy_AllFiles');
    }
  }
</script>
